<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 翻译助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-4xl mx-auto p-4">
        <!-- 头部 -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">🌐 AI 翻译助手</h1>
            <p class="text-gray-500 mt-2">翻译内容自动保存到 GitHub，方便后续复用</p>
        </div>

        <!-- 主界面 -->
        <div class="space-y-6">
            <!-- 翻译区域 -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">源语言</label>
                        <select v-model="sourceLang" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="zh">中文</option>
                            <option value="en">English</option>
                            <option value="ja">日本語</option>
                            <option value="ko">한국어</option>
                            <option value="fr">Français</option>
                            <option value="de">Deutsch</option>
                            <option value="es">Español</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">目标语言</label>
                        <select v-model="targetLang" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="en">English</option>
                            <option value="zh">中文</option>
                            <option value="ja">日本語</option>
                            <option value="ko">한국어</option>
                            <option value="fr">Français</option>
                            <option value="de">Deutsch</option>
                            <option value="es">Español</option>
                        </select>
                    </div>
                </div>

                <!-- 原文输入 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">原文</label>
                    <textarea 
                        v-model="sourceText" 
                        rows="4" 
                        placeholder="输入需要翻译的内容..."
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none resize-none"
                    ></textarea>
                </div>

                <!-- Prompt 模板 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        翻译 Prompt 模板
                        <span class="text-xs text-gray-400 font-normal ml-2">可自定义，{sourceLang} 和 {targetLang} 会被自动替换</span>
                    </label>
                    <textarea 
                        v-model="promptTemplate" 
                        rows="2" 
                        class="w-full px-4 py-2 text-sm rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none resize-none"
                    ></textarea>
                </div>

                <button 
                    @click="translate"
                    :disabled="isTranslating || !sourceText"
                    class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <span v-if="isTranslating">⏳ 翻译中，请稍候（约30秒）...</span>
                    <span v-else>🌐 开始翻译</span>
                </button>

                <!-- 状态提示 -->
                <div v-if="statusMsg" class="mt-3 text-sm text-center" :class="statusColor">{{ statusMsg }}</div>

                <!-- 翻译结果 -->
                <div v-if="translatedText" class="mt-6 p-4 bg-green-50 rounded-xl border border-green-100">
                    <div class="flex justify-between items-start mb-2">
                        <label class="text-sm font-medium text-green-800">✅ 翻译结果</label>
                        <button @click="copyResult" class="text-xs text-green-600 hover:text-green-800">📋 复制</button>
                    </div>
                    <p class="text-gray-800 whitespace-pre-wrap">{{ translatedText }}</p>
                </div>
            </div>

            <!-- 历史记录 -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                <h3 class="font-semibold text-gray-800 mb-4">📜 翻译历史（保存到 GitHub）</h3>
                <div v-if="history.length === 0" class="text-center py-8 text-gray-400">
                    暂无翻译记录
                </div>
                <div v-else class="space-y-3">
                    <div 
                        v-for="(item, index) in history" 
                        :key="index"
                        class="p-4 bg-gray-50 rounded-xl border border-gray-100 hover:border-blue-200 transition-colors cursor-pointer"
                        @click="loadFromHistory(item)"
                    >
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs text-gray-500">{{ item.timestamp }}</span>
                            <span class="text-xs px-2 py-1 bg-blue-100 text-blue-700 rounded-full">
                                {{ item.sourceLang }} → {{ item.targetLang }}
                            </span>
                        </div>
                        <p class="text-sm text-gray-700 font-medium">{{ item.sourceText }}</p>
                        <p class="text-sm text-gray-500 mt-1">{{ item.translatedText }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                // 硬编码配置
                const config = {
                    githubToken: ['ghp_', '1X6TMddPqaxd5pg', 'WGRIck5owguKtHY4', 'XbnsV'].join(''),
                    repo: 'sithingtai-coding/leave-app'
                };

                const userName = ref(localStorage.getItem('userName') || '匿名用户');
                const sourceLang = ref('zh');
                const targetLang = ref('en');
                const sourceText = ref('');
                const translatedText = ref('');
                const isTranslating = ref(false);
                const statusMsg = ref('');
                const statusColor = ref('text-blue-500');
                const history = ref([]);

                const promptTemplate = ref('你是一位专业的翻译专家。请将以下内容从 {sourceLang} 翻译成 {targetLang}，保持原文的语气和风格，只返回翻译结果，不要添加任何解释。\n\n{text}');

                const getLangName = (code) => {
                    const names = { zh: '中文', en: 'English', ja: '日本語', ko: '한국어', fr: 'Français', de: 'Deutsch', es: 'Español' };
                    return names[code] || code;
                };

                const setStatus = (msg, color = 'text-blue-500') => {
                    statusMsg.value = msg;
                    statusColor.value = color;
                };

                // 翻译功能
                const translate = async () => {
                    if (!sourceText.value || isTranslating.value) return;
                    isTranslating.value = true;
                    translatedText.value = '';
                    setStatus('正在提交翻译请求...');

                    try {
                        const prompt = promptTemplate.value
                            .replace('{sourceLang}', getLangName(sourceLang.value))
                            .replace('{targetLang}', getLangName(targetLang.value))
                            .replace('{text}', sourceText.value);

                        // 触发 GitHub Actions 工作流
                        const workflowUrl = `https://api.github.com/repos/${config.repo}/actions/workflows/translate.yml/dispatches`;
                        const dispatchResponse = await fetch(workflowUrl, {
                            method: 'POST',
                            headers: {
                                'Authorization': `token ${config.githubToken}`,
                                'Accept': 'application/vnd.github.v3+json',
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                ref: 'main',
                                inputs: {
                                    text: sourceText.value,
                                    sourceLang: sourceLang.value,
                                    targetLang: targetLang.value,
                                    prompt: prompt,
                                    user: userName.value
                                }
                            })
                        });

                        if (!dispatchResponse.ok) {
                            const errText = await dispatchResponse.text();
                            throw new Error(`提交失败 (${dispatchResponse.status}): ${errText}`);
                        }

                        // 轮询等待结果（最多等60秒）
                        setStatus('请求已提交，等待 AI 翻译中（约30秒）...');
                        const submitText = sourceText.value;
                        let found = false;
                        for (let i = 0; i < 12; i++) {
                            await new Promise(r => setTimeout(r, 5000));
                            setStatus(`等待翻译结果... (${(i+1)*5}s)`);
                            await fetchHistory();
                            if (history.value.length > 0 && history.value[0].sourceText === submitText) {
                                translatedText.value = history.value[0].translatedText;
                                found = true;
                                break;
                            }
                        }

                        if (found) {
                            setStatus('✅ 翻译完成！', 'text-green-600');
                        } else {
                            setStatus('⚠️ 未能自动获取结果，请刷新页面查看历史记录', 'text-orange-500');
                        }

                    } catch (e) {
                        setStatus('❌ 翻译失败: ' + e.message, 'text-red-500');
                    } finally {
                        isTranslating.value = false;
                    }
                };

                // 获取历史记录
                const fetchHistory = async () => {
                    try {
                        const url = `https://api.github.com/repos/${config.repo}/contents/translate-app/translation-history.json`;
                        const res = await fetch(url, {
                            headers: { 'Authorization': `token ${config.githubToken}` }
                        });
                        if (res.ok) {
                            const data = await res.json();
                            const content = atob(data.content.replace(/\n/g, ''));
                            history.value = JSON.parse(content).reverse().slice(0, 10);
                        }
                    } catch (e) {
                        console.error('获取历史失败:', e);
                    }
                };

                // 从历史加载
                const loadFromHistory = (item) => {
                    sourceText.value = item.sourceText;
                    translatedText.value = item.translatedText;
                    sourceLang.value = item.sourceLang;
                    targetLang.value = item.targetLang;
                    if (item.prompt) promptTemplate.value = item.prompt;
                };

                // 复制结果
                const copyResult = () => {
                    navigator.clipboard.writeText(translatedText.value).then(() => {
                        setStatus('✅ 已复制到剪贴板', 'text-green-600');
                    });
                };

                onMounted(() => { fetchHistory(); });

                return {
                    sourceLang, targetLang, sourceText, translatedText,
                    isTranslating, promptTemplate, history, statusMsg, statusColor,
                    translate, loadFromHistory, copyResult
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
